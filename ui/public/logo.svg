<svg width="400" height="360" viewBox="0 0 400 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    Senebiclabs — monogram seal, white on transparent.

    Mark: the papyrus fan — five reeds rising from a single base.
    The papyrus column capital defined Alexandrian architecture.
    The Library of Alexandria stood on columns like this.

    Read as data: a histogram — five bars forming a bell curve.
    The bell curve is what the healthy reference model learns for every gene.
    Deviation from this curve is disease.

    Read as botany: a lotus — five petals, symmetric, rising from water.
    Egyptian symbol of creation, rebirth, health. "Seneb" is from this world.

    Before printing: open in Inkscape → Text > Convert to Path.
  -->

  <!-- RING — outer r=100, inner r=82, centered at (200, 155) -->
  <path
    fill-rule="evenodd"
    fill="white"
    d="
      M 200 55  A 100 100 0 1 0 200 255 A 100 100 0 1 0 200 55  Z
      M 200 73  A 82  82  0 1 0 200 237 A 82  82  0 1 0 200 73  Z
    "
  />

  <!-- PAPYRUS FAN — five reeds from base (200, 220), centered in seal -->
  <line   x1="200" y1="220" x2="200" y2="94"  stroke="white" stroke-width="14" stroke-linecap="round"/>
  <path d="M 200 220 C 183 189 169 147 169 112" stroke="white" stroke-width="14" stroke-linecap="round"/>
  <path d="M 200 220 C 217 189 231 147 231 112" stroke="white" stroke-width="14" stroke-linecap="round"/>
  <path d="M 200 220 C 172 210 148 182 148 147" stroke="white" stroke-width="14" stroke-linecap="round"/>
  <path d="M 200 220 C 228 210 252 182 252 147" stroke="white" stroke-width="14" stroke-linecap="round"/>

  <!-- Base node -->
  <circle cx="200" cy="220" r="9"  fill="white"/>
  <!-- Tip nodes -->
  <circle cx="200" cy="94"  r="7"  fill="white"/>
  <circle cx="169" cy="112" r="7"  fill="white"/>
  <circle cx="231" cy="112" r="7"  fill="white"/>
  <circle cx="148" cy="147" r="7"  fill="white"/>
  <circle cx="252" cy="147" r="7"  fill="white"/>

  <!-- WORDMARK -->
  <text
    x="200"
    y="294"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="26"
    font-weight="300"
    letter-spacing="9"
    fill="white"
    text-anchor="middle"
  >SENEBICLABS</text>

  <!-- TAGLINE -->
  <text
    x="200"
    y="324"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="9"
    font-weight="400"
    letter-spacing="4"
    fill="white"
    opacity="0.5"
    text-anchor="middle"
  >RESPIRATORY INTELLIGENCE</text>

</svg>
