<svg width="1500" height="500" viewBox="0 0 1500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    Senebiclabs — background profile / social banner.
    1500x500 — standard for Twitter/X, LinkedIn cover photo.
    The profile photo circle overlaps the bottom-left; main content is centred.
    Before use: open in browser, right-click → Save image as PNG if platform needs raster.
  -->

  <!-- Background -->
  <rect width="1500" height="500" fill="#0A0A0F"/>

  <!-- Ghost fan mark — large, right side, very low opacity for depth -->
  <g opacity="0.07" stroke="white" fill="white" stroke-linecap="round">
    <line   x1="1310" y1="430" x2="1310" y2="130" stroke-width="28"/>
    <path d="M 1310 430 C 1268 355 1235 255 1235 172" stroke-width="28"/>
    <path d="M 1310 430 C 1352 355 1385 255 1385 172" stroke-width="28"/>
    <path d="M 1310 430 C 1243 397 1185 330 1185 255" stroke-width="28"/>
    <path d="M 1310 430 C 1377 397 1435 330 1435 255" stroke-width="28"/>
    <circle cx="1310" cy="430" r="20"/>
    <circle cx="1310" cy="130" r="16"/>
    <circle cx="1235" cy="172" r="16"/>
    <circle cx="1385" cy="172" r="16"/>
    <circle cx="1185" cy="255" r="16"/>
    <circle cx="1435" cy="255" r="16"/>
  </g>

  <!-- Top rule -->
  <line x1="80" y1="175" x2="1420" y2="175" stroke="white" stroke-width="0.5" opacity="0.18"/>

  <!-- Wordmark — ultralight, extreme tracking, fills the banner -->
  <text
    x="750"
    y="268"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="96"
    font-weight="100"
    letter-spacing="52"
    fill="white"
    text-anchor="middle"
  >SENEBICLABS</text>

  <!-- Bottom rule -->
  <line x1="80" y1="292" x2="1420" y2="292" stroke="white" stroke-width="0.5" opacity="0.18"/>

  <!-- Tagline -->
  <text
    x="750"
    y="336"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="12"
    font-weight="300"
    letter-spacing="8"
    fill="white"
    opacity="0.32"
    text-anchor="middle"
  >RESPIRATORY INTELLIGENCE</text>

</svg>
